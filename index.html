<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Huynh — Senior Software Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #161616;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e6df;
    --muted: #6b6860;
    --accent: #c8ff3e;
    --accent2: rgba(200,255,62,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 3rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: -0.02em;
    color: var(--text);
    text-decoration: none;
  }

  .nav-logo span { color: var(--accent); }

  nav ul {
    list-style: none;
    display: flex;
    gap: 2.5rem;
  }

  nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  nav a:hover { color: var(--text); }

  /* ── SECTIONS ── */
  section { padding: 6rem 3rem; max-width: 1100px; margin: 0 auto; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 8rem;
    max-width: 1100px;
    margin: 0 auto;
    padding-left: 3rem;
    padding-right: 3rem;
    position: relative;
  }

  .hero-tag {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .hero-tag::before {
    content: '';
    display: block;
    width: 2rem;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 2rem;
  }

  h1 .dim { color: var(--muted); }

  .hero-desc {
    max-width: 540px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 3rem;
  }

  .hero-links {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 0.75rem 1.5rem;
    text-decoration: none;
    border: 1px solid var(--border2);
    color: var(--text);
    transition: all 0.2s;
    display: inline-block;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-accent {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
    font-weight: 500;
  }

  .btn-accent:hover {
    background: transparent;
    color: var(--accent);
  }

  .hero-scroll {
    position: absolute;
    bottom: 3rem;
    right: 3rem;
    writing-mode: vertical-rl;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .hero-scroll::after {
    content: '';
    display: block;
    width: 1px;
    height: 3rem;
    background: var(--muted);
    animation: scrollLine 2s ease-in-out infinite;
  }

  @keyframes scrollLine {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(0.5); }
  }

  /* ── SECTION LABELS ── */
  .section-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 3rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-label::before {
    content: '';
    display: block;
    width: 2rem;
    height: 1px;
    background: var(--accent);
  }

  /* ── ABOUT ── */
  #about { border-top: 1px solid var(--border); }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: start;
  }

  .about-text h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .about-text p {
    color: var(--muted);
    line-height: 1.9;
    margin-bottom: 1rem;
  }

  .about-stats {
    display: grid;
    gap: 1px;
    background: var(--border);
  }

  .stat {
    background: var(--bg);
    padding: 1.5rem 2rem;
    transition: background 0.2s;
  }

  .stat:hover { background: var(--bg3); }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.35rem;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── EXPERIENCE ── */
  #experience { border-top: 1px solid var(--border); }

  .exp-list { display: flex; flex-direction: column; }

  .exp-item {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 3rem;
    padding: 2.5rem 0;
    border-bottom: 1px solid var(--border);
    transition: all 0.2s;
  }

  .exp-item:last-child { border-bottom: none; }

  .exp-item:hover .exp-company { color: var(--accent); }

  .exp-meta { padding-top: 0.15rem; }

  .exp-company {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.35rem;
    transition: color 0.2s;
  }

  .exp-period {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .exp-role {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.75rem;
    letter-spacing: -0.01em;
  }

  .exp-desc {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.8;
  }

  .exp-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 1rem;
  }

  .tag {
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--border2);
    color: var(--muted);
  }

  /* ── SKILLS ── */
  #skills { border-top: 1px solid var(--border); }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
  }

  .skill-group {
    background: var(--bg);
    padding: 2rem;
    transition: background 0.2s;
  }

  .skill-group:hover { background: var(--bg3); }

  .skill-group-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.25rem;
  }

  .skill-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .skill-list li {
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .skill-list li::before {
    content: '';
    display: block;
    width: 4px;
    height: 4px;
    background: var(--muted);
    flex-shrink: 0;
  }

  /* ── CONTACT ── */
  #contact { border-top: 1px solid var(--border); }

  .contact-wrap {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4rem;
    align-items: end;
  }

  .contact-heading {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
  }

  .contact-heading .accent { color: var(--accent); }

  .contact-desc {
    color: var(--muted);
    max-width: 420px;
    line-height: 1.8;
    margin-bottom: 2rem;
  }

  .contact-links {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    align-items: flex-end;
  }

  .contact-link {
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: color 0.2s;
  }

  .contact-link:hover { color: var(--accent); }

  .contact-link::before {
    content: '→';
    opacity: 0;
    transform: translateX(-4px);
    transition: all 0.2s;
  }

  .contact-link:hover::before {
    opacity: 1;
    transform: translateX(0);
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 2rem 3rem;
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.06em;
  }

  /* ── FADE-IN ON SCROLL ── */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── HERO ENTRANCE ── */
  .hero-tag { animation: fadeUp 0.6s ease 0.2s both; }
  h1 { animation: fadeUp 0.6s ease 0.35s both; }
  .hero-desc { animation: fadeUp 0.6s ease 0.5s both; }
  .hero-links { animation: fadeUp 0.6s ease 0.65s both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    nav ul {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      gap: 0;
      background: rgba(10,10,10,0.97);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
    }
    nav ul.open { display: flex; }
    nav ul li a {
      display: block;
      padding: 0.75rem 1.5rem;
      font-size: 13px;
    }
    .nav-hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }
    .nav-hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--text);
      transition: all 0.2s;
    }
    section { padding: 3.5rem 1.25rem; }
    #hero { padding-left: 1.25rem; padding-right: 1.25rem; padding-top: 6rem; }
    .hero-links { flex-direction: column; gap: 0.75rem; }
    .hero-links .btn { text-align: center; }
    .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
    .exp-item { grid-template-columns: 1fr; gap: 0.5rem; }
    .skills-grid { grid-template-columns: 1fr 1fr; }
    .contact-wrap { grid-template-columns: 1fr; gap: 2rem; }
    .contact-links { align-items: flex-start; }
    .hero-scroll { display: none; }
    footer { flex-direction: column; gap: 0.5rem; text-align: center; padding: 1.5rem; }
  }

  @media (max-width: 480px) {
    .skills-grid { grid-template-columns: 1fr; }
    h1 { font-size: 3.5rem; }
  }
</style>
</head>

<style>
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
#chat-messages::-webkit-scrollbar { width: 3px; }
#chat-messages::-webkit-scrollbar-track { background: transparent; }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border2); }

<script>
const chatHistory = [];
const CHAT_ENDPOINT = "https://api.thuynhportfolio.dev/api/portfolio-chat";
const PORTFOLIO_TOKEN = "6905b11963425662e01d6334d0835392d0c3c69717e83aa7e34d53f3b90abfdb";

async function sendChat() {
  const input = document.getElementById('chat-input');
  const messages = document.getElementById('chat-messages');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text || btn.disabled) return;

  input.value = '';
  btn.disabled = true;
  btn.style.opacity = '0.5';

  const userBubble = document.createElement('div');
  userBubble.style.cssText = 'align-self: flex-end; background: rgba(200,255,62,0.1); border: 1px solid rgba(200,255,62,0.2); padding: 0.75rem 1rem; font-size: 12px; color: var(--text); line-height: 1.6; max-width: 85%;';
  userBubble.textContent = text;
  messages.appendChild(userBubble);

  const typingBubble = document.createElement('div');
  typingBubble.style.cssText = 'align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); padding: 0.75rem 1rem; font-size: 12px; color: var(--muted); line-height: 1.6; max-width: 90%;';
  typingBubble.textContent = '···';
  messages.appendChild(typingBubble);
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Portfolio-Token': PORTFOLIO_TOKEN },
      body: JSON.stringify({ message: text, history: chatHistory })
    });

    const data = await res.json();

    if (!res.ok) {
      typingBubble.style.color = 'var(--muted)';
      typingBubble.textContent = data.error || "That\u2019s outside my lane \u2014 try asking about Tim\u2019s experience, skills, or projects.";
    } else {
      const reply = data.data.reply;
      chatHistory.push({ role: 'user', content: text });
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 20) chatHistory.splice(0, 2);
      typingBubble.style.color = 'var(--text)';
      typingBubble.textContent = reply;
    }
  } catch (e) {
    typingBubble.textContent = "That\u2019s outside my lane \u2014 I\u2019m here to answer questions about Tim\u2019s experience, skills, and projects. Try asking: \u2018What has Tim built?\u2019 or \u2018How can I reach him?\u2019";
  }

  btn.disabled = false;
  btn.style.opacity = '1';
  messages.scrollTop = messages.scrollHeight;
}

</script>

<script>
  const observer = new IntersectionObserver(
    (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
    { threshold: 0.1, rootMargin: '0px 0px -60px 0px' }
  );

  function observe() {
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  }

  function ghLink(url, label) {
    return `<a href="${url}" target="_blank" rel="noopener"
      style="font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:0.05em;border:1px solid var(--border2);padding:0.5rem 1rem;transition:all 0.2s;display:inline-block;white-space:nowrap;"
      onmouseenter="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'"
      onmouseleave="this.style.color='var(--muted)';this.style.borderColor='var(--border2)'">${label} ↗</a>`;
  }

  function tags(arr) {
    return `<div class="exp-tags">${arr.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
  }

  async function render() {
    const res = await fetch('data.json?v=' + Date.now());
    const d = await res.json();
    const m = d.meta;

    // Nav
    document.getElementById('nav-github').href = m.github;

    // Hero
    if (m.available) document.getElementById('hero-tag').textContent = m.availableText;
    const [first, ...rest] = m.name.split(' ');
    document.getElementById('hero-name').innerHTML = `${first}<br><span class="dim">${rest.join(' ')}</span>`;
    document.getElementById('hero-desc').textContent = m.heroDesc;
    document.getElementById('hero-github').href = m.github;

    // About
    document.getElementById('about-heading').innerHTML = d.about.heading.replace(' that', '<br>that');
    document.getElementById('about-paragraphs').innerHTML = d.about.paragraphs.map(p => `<p>${p}</p>`).join('');
    document.getElementById('about-stats').innerHTML = d.about.stats.map(s =>
      `<div class="stat"><div class="stat-num">${s.value}</div><div class="stat-label">${s.label}</div></div>`
    ).join('');

    // Experience
    document.getElementById('exp-list').innerHTML = d.experience.map(e =>
      `<div class="exp-item reveal">
        <div class="exp-meta">
          <div class="exp-company">${e.company}</div>
          <div class="exp-period">${e.period}</div>
        </div>
        <div>
          <div class="exp-role">${e.role}</div>
          <div class="exp-desc">${e.description}</div>
          ${tags(e.tags)}
        </div>
      </div>`
    ).join('');

    // Projects
    document.getElementById('projects-list').innerHTML = d.projects.map((p, i) => {
      if (p.demo) {
        return `<div style="border:1px solid var(--border2);margin-bottom:1px;" class="reveal">
          <div style="display:grid;grid-template-columns:1fr 1fr;min-height:520px;" class="project-demo-grid">
            <div style="padding:2.5rem;border-right:1px solid var(--border);">
              <div style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;">${p.period}</div>
              <div style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text);margin-bottom:0.75rem;letter-spacing:-0.01em;">${p.title}</div>
              <p style="color:var(--muted);font-size:13px;line-height:1.8;margin-bottom:1.25rem;">${p.description}</p>
              ${p.description2 ? `<p style="color:var(--muted);font-size:13px;line-height:1.8;margin-bottom:1.5rem;">${p.description2}</p>` : ''}
              <div style="margin-bottom:1.5rem;">${tags(p.tags)}</div>
              ${ghLink(p.github, 'github.com/timhuynh94')}
            </div>
            <div class="project-demo-chat" style="padding:2rem;display:flex;flex-direction:column;background:var(--bg2);">
              <div style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;">
                <span style="width:6px;height:6px;background:var(--accent);border-radius:50%;display:inline-block;animation:pulse 2s infinite;"></span>
                Live demo — powered by llama3.1:8b
              </div>
              <div id="chat-messages" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1rem;min-height:280px;max-height:320px;padding-right:0.25rem;">
                <div style="align-self:flex-start;background:var(--bg3);border:1px solid var(--border);padding:0.75rem 1rem;font-size:12px;color:var(--text);line-height:1.6;max-width:90%;">
                  Hey! I'm your Fitness Intelligence Agent. Ask me about workout planning, recovery, progressive overload, or training analysis. What are you working on?
                </div>
              </div>
              <div style="display:flex;gap:0.5rem;">
                <input id="chat-input" type="text" placeholder="Ask about training, recovery, nutrition..."
                  style="flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:0.65rem 1rem;font-family:'DM Mono',monospace;font-size:12px;outline:none;"
                  onkeydown="if(event.key==='Enter') sendChat()"
                  onfocus="this.style.borderColor='var(--accent)'"
                  onblur="this.style.borderColor='var(--border2)'" />
                <button onclick="sendChat()" id="send-btn"
                  style="background:var(--accent);color:#0a0a0a;border:none;padding:0.65rem 1.25rem;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;transition:opacity 0.2s;white-space:nowrap;"
                  onmouseenter="this.style.opacity='0.85'" onmouseleave="this.style.opacity='1'">Send</button>
              </div>
              <div style="margin-top:0.75rem;font-size:10px;color:var(--muted);letter-spacing:0.04em;">
                Running on self-hosted llama3.1:8b via Ollama
              </div>
            </div>
          </div>
        </div>`;
      } else {
        return `<div style="border:1px solid var(--border);padding:2.5rem;display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:start;" class="project-simple reveal">
          <div>
            <div style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;">${p.period}</div>
            <div style="font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;color:var(--text);margin-bottom:0.75rem;letter-spacing:-0.01em;">${p.title}</div>
            <p style="color:var(--muted);font-size:13px;line-height:1.8;margin-bottom:1.25rem;">${p.description}</p>
            ${tags(p.tags)}
          </div>
          <div class="project-simple-link" style="margin-top:2.5rem;">${ghLink(p.github, 'View on GitHub')}</div>
        </div>`;
      }
    }).join('');

    // Skills
    document.getElementById('skills-grid').innerHTML = d.skills.map(s =>
      `<div class="skill-group">
        <div class="skill-group-title">${s.group}</div>
        <ul class="skill-list">${s.items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>`
    ).join('');

    // Contact
    document.getElementById('contact-desc').textContent = m.contactDesc;
    document.getElementById('contact-email').href = `mailto:${m.email}`;
    document.getElementById('contact-email').textContent = m.email;
    document.getElementById('contact-links').innerHTML = `
      <a href="${m.github}" class="contact-link" target="_blank" rel="noopener">GitHub</a>
      <a href="${m.linkedin}" class="contact-link" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:${m.email}" class="contact-link">Email</a>`;

    // Footer
    const [fname, ...lname] = m.name.split(' ');
    document.getElementById('footer-name').textContent = `${m.name} © ${m.year}`;
    document.getElementById('footer-location').textContent = m.location;

    // Re-run scroll observer now that DOM is populated
    observe();
  }

  render().catch(console.error);

  // Hamburger menu
  const toggle = document.getElementById('nav-toggle');
  const navLinks = document.getElementById('nav-links');
  toggle.addEventListener('click', () => navLinks.classList.toggle('open'));
  navLinks.querySelectorAll && document.addEventListener('click', e => {
    if (!e.target.closest('nav')) navLinks.classList.remove('open');
  });
  // Close on link click
  document.getElementById('nav-links').addEventListener('click', e => {
    if (e.target.tagName === 'A') navLinks.classList.remove('open');
  });
</script>
</body>
</html>
